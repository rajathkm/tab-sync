<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 360px;
      min-height: 200px;
      max-height: 600px;
      overflow-y: auto;
    }

    /* === Header === */
    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 16px;
    }

    .popup-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .popup-header-left svg {
      color: var(--amber);
      flex-shrink: 0;
    }

    .popup-header h1 {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      position: relative;
    }

    .popup-header h1::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
      border-radius: 1px;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-btn:hover {
      color: var(--dark-muted);
      background: var(--cream-dark);
    }

    /* === No Setup State === */
    .no-setup {
      padding: 40px 24px;
      text-align: center;
    }

    .no-setup-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
    }

    .no-setup p {
      color: var(--gray);
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* === Profile Cards === */
    .profiles-list {
      padding: 0 16px 16px;
    }

    .profile-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }

    .profile-card:last-child {
      margin-bottom: 0;
    }

    .profile-card:hover {
      box-shadow: var(--shadow-md);
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .profile-name {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      text-transform: capitalize;
      color: var(--dark);
    }

    /* === Toggle Rows === */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .toggle-row label {
      color: var(--dark-muted);
      font-size: 13px;
      font-weight: 400;
    }

    /* === Push Button === */
    .push-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: var(--dark);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--cream);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .push-btn:hover {
      background: var(--dark-muted);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .push-btn:active {
      transform: translateY(0);
    }

    .push-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .push-btn svg {
      flex-shrink: 0;
    }

    .push-status {
      font-size: 11px;
      color: var(--gray);
      text-align: center;
      margin-top: 6px;
      min-height: 16px;
    }

    /* === Scrollbar === */
    body::-webkit-scrollbar {
      width: 4px;
    }
    body::-webkit-scrollbar-track {
      background: transparent;
    }
    body::-webkit-scrollbar-thumb {
      background: var(--gray-light);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 1l4 4-4 4"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <path d="M7 23l-4-4 4-4"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
      <h1>Tab Sync</h1>
    </div>
    <button class="settings-btn" id="settings-btn" title="Settings" aria-label="Open settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
  <div id="content"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
